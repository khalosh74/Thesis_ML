name: Release Gate

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  validate_release_artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build and validate package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pytest
          python -m build --sdist --wheel
          python -m twine check dist/*

      - name: Install built wheel
        run: |
          set -euo pipefail
          WHEEL_PATH="$(python - <<'PY'
          from pathlib import Path

          wheels = sorted(Path("dist").glob("*.whl"))
          if not wheels:
              raise SystemExit("No wheel artifact found in dist/.")
          print(wheels[-1])
          PY
          )"
          python -m pip install --force-reinstall "${WHEEL_PATH}"

      - name: Wheel CLI smoke
        run: |
          thesisml-run-decision-support --help
          thesisml-workbook --output /tmp/thesis_experiment_program_release_gate.xlsx
          test -f /tmp/thesis_experiment_program_release_gate.xlsx

      - name: Wheel shipped-registry dry-run smoke
        run: |
          python - <<'PY'
          from pathlib import Path
          import pandas as pd

          temp_root = Path("/tmp/thesisml_release_registry")
          temp_root.mkdir(parents=True, exist_ok=True)
          pd.DataFrame(
              [{"subject": "sub-001", "task": "passive", "modality": "audio"}]
          ).to_csv(temp_root / "dataset_index.csv", index=False)
          PY

          thesisml-run-decision-support \
            --registry configs/decision_support_registry.json \
            --index-csv /tmp/thesisml_release_registry/dataset_index.csv \
            --data-root /tmp/thesisml_release_registry/Data \
            --cache-dir /tmp/thesisml_release_registry/cache \
            --output-root /tmp/thesisml_release_registry/outputs \
            --all \
            --dry-run

      - name: Lightweight runtime test
        run: |
          python -m pytest tests/test_import_decoupling.py -q

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: dist/*

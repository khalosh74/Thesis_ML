name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: >
          python -m ruff check src/Thesis_ML/artifacts src/Thesis_ML/orchestration
          src/Thesis_ML/workbook src/Thesis_ML/experiments/segment_execution.py
          src/Thesis_ML/experiments/sections.py src/Thesis_ML/experiments/run_experiment.py
          tests/test_artifact_registry.py tests/test_segment_execution.py
          tests/test_workbook_compiler.py tests/test_workbook_roundtrip.py
          tests/test_execution_idempotency.py --exclude src/Thesis_ML/workbook/template_builder.py

      - name: Ruff format check
        run: >
          python -m ruff format --check src/Thesis_ML/artifacts src/Thesis_ML/orchestration
          src/Thesis_ML/workbook src/Thesis_ML/experiments/segment_execution.py
          src/Thesis_ML/experiments/sections.py src/Thesis_ML/experiments/run_experiment.py
          tests/test_artifact_registry.py tests/test_segment_execution.py
          tests/test_workbook_compiler.py tests/test_workbook_roundtrip.py
          tests/test_execution_idempotency.py --exclude src/Thesis_ML/workbook/template_builder.py

      - name: Mypy type check
        run: python -m mypy

      - name: Pytest
        run: python -m pytest -q

  build_verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build package artifacts
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build --sdist --wheel
          python -m twine check dist/*

      - name: Optuna optional-mode smoke
        run: |
          python -m pip install -e ".[dev,optuna]"
          python -m pytest tests/test_search_space_and_aggregation.py::test_optuna_search_space_expands_when_enabled -q

      - name: Wheel install and CLI smoke (clean venv)
        run: |
          set -euo pipefail
          WHEEL_PATH="$(python - <<'PY'
          from pathlib import Path

          wheels = sorted(Path("dist").glob("*.whl"))
          if not wheels:
              raise SystemExit("No wheel artifact found in dist/.")
          print(wheels[-1])
          PY
          )"

          python -m venv /tmp/thesisml-wheel-smoke
          source /tmp/thesisml-wheel-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "${WHEEL_PATH}"

          thesisml-run-decision-support --help
          thesisml-workbook --output /tmp/thesisml_pkg_smoke_workbook.xlsx
          test -f /tmp/thesisml_pkg_smoke_workbook.xlsx

          python - <<'PY'
          from pathlib import Path
          import pandas as pd

          temp_root = Path("/tmp/thesisml_pkg_smoke")
          temp_root.mkdir(parents=True, exist_ok=True)
          pd.DataFrame(
              [{"subject": "sub-001", "task": "passive", "modality": "audio"}]
          ).to_csv(temp_root / "dataset_index.csv", index=False)
          PY

          thesisml-run-decision-support \
            --registry configs/decision_support_registry.json \
            --index-csv /tmp/thesisml_pkg_smoke/dataset_index.csv \
            --data-root /tmp/thesisml_pkg_smoke/Data \
            --cache-dir /tmp/thesisml_pkg_smoke/cache \
            --output-root /tmp/thesisml_pkg_smoke/outputs \
            --all \
            --dry-run

  uv_locked_smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Sync locked environment
        run: python -m uv sync --frozen --extra dev

      - name: Locked test smoke
        run: python -m uv run python -m pytest tests/test_import_decoupling.py -q

      - name: Locked mypy smoke
        run: python -m uv run python -m mypy

      - name: Locked lint smoke
        run: >
          python -m uv run python -m ruff check src/Thesis_ML/artifacts
          src/Thesis_ML/orchestration src/Thesis_ML/workbook
          src/Thesis_ML/experiments/segment_execution.py src/Thesis_ML/experiments/sections.py
          src/Thesis_ML/experiments/run_experiment.py tests/test_artifact_registry.py
          tests/test_segment_execution.py tests/test_workbook_compiler.py
          tests/test_workbook_roundtrip.py tests/test_execution_idempotency.py
          --exclude src/Thesis_ML/workbook/template_builder.py

      - name: Workbook generation smoke
        run: |
          python -m uv run thesisml-workbook --output /tmp/thesis_experiment_program.xlsx
          test -f /tmp/thesis_experiment_program.xlsx

      - name: Validate shipped workbook asset(s)
        run: |
          python -m uv run python - <<'PY'
          from pathlib import Path

          from Thesis_ML.orchestration.workbook_compiler import compile_workbook_file
          from Thesis_ML.workbook.validation import validate_workbook

          def _is_true(value: object) -> bool:
              return str(value).strip().lower() in {"true", "1", "yes"}

          def _is_none_or_empty(value: object) -> bool:
              return str(value).strip() in {"", "None", "none", "[]"}

          template_path = Path("templates/thesis_experiment_program.xlsx")
          if not template_path.exists():
              raise FileNotFoundError(f"Missing shipped workbook template: {template_path}")

          summary = validate_workbook(template_path)
          assert _is_true(summary.get("sheet_order_ok")), summary
          assert _is_none_or_empty(summary.get("missing_sheets")), summary.get("missing_sheets")
          assert _is_true(summary.get("required_named_lists_present")), summary
          assert _is_true(summary.get("workbook_schema_supported")), summary

          try:
              template_manifest = compile_workbook_file(template_path)
          except ValueError as exc:
              message = str(exc)
              if "No enabled executable rows were found in Experiment_Definitions." not in message:
                  raise
              print("Template compile expectation: non-runnable template (no enabled rows).")
          else:
              if len(template_manifest.trial_specs) == 0:
                  raise AssertionError("Workbook template compiled with zero trial specs.")
              print(
                  f"Template compile expectation: runnable template with {len(template_manifest.trial_specs)} trial specs."
              )

          workbook_assets = sorted(template_path.parent.glob("*.xlsx"))
          sample_paths = [path for path in workbook_assets if path.resolve() != template_path.resolve()]

          if sample_paths:
              for sample_path in sample_paths:
                  sample_manifest = compile_workbook_file(sample_path)
                  if len(sample_manifest.trial_specs) == 0:
                      raise AssertionError(
                          f"Workbook asset compiled with zero trial specs: {sample_path}"
                      )
                  print(
                      f"Compiled workbook asset: {sample_path} ({len(sample_manifest.trial_specs)} trial specs)."
                  )
          else:
              print("No additional committed workbook assets detected under templates/.")
          PY

      - name: Shipped registry dry-run smoke
        run: |
          python -m uv run python - <<'PY'
          from pathlib import Path
          import pandas as pd

          temp_root = Path("/tmp/thesisml_ci_registry")
          temp_root.mkdir(parents=True, exist_ok=True)
          pd.DataFrame(
              [{"subject": "sub-001", "task": "passive", "modality": "audio"}]
          ).to_csv(temp_root / "dataset_index.csv", index=False)
          PY

          python -m uv run thesisml-run-decision-support \
            --registry configs/decision_support_registry.json \
            --index-csv /tmp/thesisml_ci_registry/dataset_index.csv \
            --data-root /tmp/thesisml_ci_registry/Data \
            --cache-dir /tmp/thesisml_ci_registry/cache \
            --output-root /tmp/thesisml_ci_registry/outputs \
            --all \
            --dry-run

      - name: Workbook compile/write-back smoke
        run: |
          python -m uv run python -m pytest tests/test_workbook_roundtrip.py::test_workbook_roundtrip_compile_execute_writeback -q

      - name: Segment execution smoke
        run: |
          python -m uv run python -m pytest tests/test_segment_execution.py::test_segment_execution_feature_matrix_to_evaluation -q

      - name: Decision-support CLI smoke
        run: |
          python -m uv run thesisml-run-decision-support --help
